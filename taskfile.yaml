# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  NAME: "oauth-helpers"
  DESCRIPTION: "Go library providing OAuth 2.0 helper utilities"
  GOLANGCI_LINT_VERSION: "v2.11.4"
  GOVULNCHECK_VERSION: "v1.1.4"
  COVER: "{{.ROOT_DIR | toSlash}}/.task/cover"
  HAS_CC:
    sh: command -v "$(go env CC)" >/dev/null 2>&1 && echo true || echo false
  RACE_FLAG: '{{ if eq .HAS_CC "true" }}-race{{ end }}'

env:
  CGO_ENABLED: "0"
  GOWORK: "off"

tasks:
  # ──────────────────────────────────────────────────────────────────────────────
  # Info
  # ──────────────────────────────────────────────────────────────────────────────

  default:
    aliases:
      - info
    silent: true
    desc: Display project information
    cmds:
      - |
        echo "------------------------------------------------------------"
        echo "{{.NAME}} Taskfile"
        echo "------------------------------------------------------------"
        echo "Usage:"
        echo "  task            # Prints this info section"
        echo "  task test       # Run tests"
        echo "  task lint       # Run linter"
        echo "  task test-cover # Run tests with coverage"
        echo "  task ci         # Full CI pipeline"
        echo "------------------------------------------------------------"

  # ──────────────────────────────────────────────────────────────────────────────
  # Modules
  # ──────────────────────────────────────────────────────────────────────────────

  mod:
    desc: Downloads and tidy Go modules
    silent: true
    sources:
      - go.mod
      - go.sum
    cmds:
      - go mod download
      - go mod tidy

  mod:check:
    desc: "Check if go.mod and go.sum are in sync"
    silent: true
    cmds:
      - |
        set -e
        cp go.mod go.mod.bak
        cp go.sum go.sum.bak

        go mod tidy > /dev/null 2>&1

        if diff -q go.mod go.mod.bak > /dev/null 2>&1 && diff -q go.sum go.sum.bak > /dev/null 2>&1; then
          echo "✅ go.mod and go.sum are tidy"
          rm -f go.mod.bak go.sum.bak
          exit 0
        fi

        mv go.mod.bak go.mod
        mv go.sum.bak go.sum
        echo "❌ go.mod and go.sum need tidying"
        echo "Run 'task mod' or 'go mod tidy' to fix."
        exit 1

  # ──────────────────────────────────────────────────────────────────────────────
  # Linting & Static Analysis
  # ──────────────────────────────────────────────────────────────────────────────

  lint:
    desc: "Run golangci-lint (pinned to {{.GOLANGCI_LINT_VERSION}})"
    aliases: [l]
    silent: true
    sources:
      - "./**/*.go"
      - .golangci.yml
    cmds:
      - |
        set -e
        echo "Running golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
        go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}} run ./... --config .golangci.yml --timeout 5m0s
        echo "✅ No linting issues found"

  lint:fix:
    desc: "Run golangci-lint and fix issues"
    silent: true
    sources:
      - "./**/*.go"
      - .golangci.yml
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}} run --fix

  vet:
    desc: "Run go vet"
    silent: true
    sources:
      - "./**/*.go"
      - go.mod
      - go.sum
    cmds:
      - go vet ./...

  # ──────────────────────────────────────────────────────────────────────────────
  # Security
  # ──────────────────────────────────────────────────────────────────────────────

  vulncheck:
    desc: "Check for known vulnerabilities in dependencies"
    silent: true
    cmds:
      - |
        go run golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_VERSION}} ./...

  # ──────────────────────────────────────────────────────────────────────────────
  # Testing
  # ──────────────────────────────────────────────────────────────────────────────

  test:
    desc: "Run test suite"
    aliases: [t]
    env:
      GOFLAGS: '{{.GOFLAGS | default "-count=1"}}'
      GOTESTFLAGS: '{{.GOTESTFLAGS | default "-shuffle=on"}}'
    cmds:
      - go test $GOTESTFLAGS -timeout 5m ./...
    sources:
      - "**/*.go"
      - go.mod
      - go.sum

  test-cover:
    desc: "Run tests with coverage profile"
    silent: true
    env:
      GOFLAGS: '{{.GOFLAGS | default "-count=1"}}'
      GOTESTFLAGS: '{{.GOTESTFLAGS | default "-shuffle=on"}}'
    cmds:
      - mkdir -p {{.COVER}}
      - go test $GOTESTFLAGS -coverprofile={{.COVER}}/cover.out -covermode=atomic ./...
    sources:
      - "**/*.go"
      - go.mod
      - go.sum

  test:race:
    desc: "Run tests with race detector enabled"
    preconditions:
      - sh: '[ "{{.HAS_CC}}" = "true" ]'
        msg: "Skipping race tests: no C compiler found -- race detector requires cgo"
    env:
      CGO_ENABLED: "1"
      GOFLAGS: '{{.GOFLAGS | default "-count=1"}}'
      GOTESTFLAGS: '{{.GOTESTFLAGS | default "-shuffle=on"}}'
    cmds:
      - go test $GOTESTFLAGS -race -timeout 5m ./...
    sources:
      - "**/*.go"
      - go.mod
      - go.sum

  # ──────────────────────────────────────────────────────────────────────────────
  # Coverage
  # ──────────────────────────────────────────────────────────────────────────────

  coverage:
    desc: "Generate test coverage profile"
    silent: true
    cmds:
      - mkdir -p {{.COVER}}
      - go test ./... -coverprofile={{.COVER}}/cover.out -covermode=atomic -coverpkg=./...
    sources:
      - "**/*.go"
      - go.mod
      - go.sum

  coverage:report:
    desc: "Print detailed test coverage report"
    silent: true
    deps: [coverage]
    cmds:
      - go tool cover -func={{.COVER}}/cover.out

  coverage:html:
    desc: "Generate HTML coverage report and open in browser"
    silent: true
    deps: [coverage]
    cmds:
      - go tool cover -html={{.COVER}}/cover.out -o {{.COVER}}/coverage.html
      - |
        echo "✅ HTML report generated at {{.COVER}}/coverage.html"
        if command -v open >/dev/null 2>&1; then
          open {{.COVER}}/coverage.html
        elif command -v xdg-open >/dev/null 2>&1; then
          xdg-open {{.COVER}}/coverage.html
        fi
    generates:
      - "{{.COVER}}/coverage.html"

  coverage:check:
    desc: "Check if test coverage meets minimum threshold (default: 50.0%)"
    silent: true
    deps: [coverage]
    vars:
      COVERAGE_THRESHOLD: '{{ .COVERAGE_THRESHOLD | default "50.0" }}'
    cmds:
      - |
        set -e
        TOTAL=$(go tool cover -func={{.COVER}}/cover.out | tail -1 | awk '{print $3}' | tr -d '%')
        echo "Total coverage: ${TOTAL}%"
        echo "Threshold:      {{.COVERAGE_THRESHOLD}}%"
        if awk "BEGIN {exit !(${TOTAL} < {{.COVERAGE_THRESHOLD}})}"; then
          echo "❌ Coverage ${TOTAL}% is below threshold {{.COVERAGE_THRESHOLD}}%"
          exit 1
        fi
        echo "✅ Coverage meets threshold"
    sources:
      - "{{.COVER}}/cover.out"

  # ──────────────────────────────────────────────────────────────────────────────
  # Cleaning
  # ──────────────────────────────────────────────────────────────────────────────

  clean:
    desc: "Clean build artifacts and caches"
    silent: true
    cmds:
      - |
        echo "🧹 Cleaning..."
        go clean -cache -testcache
        rm -rf .task/
        find ./ -name "coverage.*" -type f -delete
        find ./ -name ".DS_Store" -type f -delete
        echo "✅ Clean complete"

  # ──────────────────────────────────────────────────────────────────────────────
  # CI Pipeline
  # ──────────────────────────────────────────────────────────────────────────────

  ci:
    desc: "Full CI pipeline — lint, test, coverage"
    vars:
      COVERAGE_THRESHOLD: '{{ .COVERAGE_THRESHOLD | default "50.0" }}'
    silent: true
    cmds:
      - |
        set -e

        echo "=========================================="
        echo "🚀 Starting CI Pipeline"
        echo "=========================================="

        echo ""
        echo "✅ Step 1/5: Module Check"
        task mod:check

        echo ""
        echo "✅ Step 2/5: Go Vet"
        task vet

        echo ""
        echo "✅ Step 3/5: Linting"
        task lint

        echo ""
        echo "✅ Step 4/5: Tests"
        task test

        echo ""
        echo "✅ Step 5/5: Coverage Check"
        COVERAGE_THRESHOLD="{{.COVERAGE_THRESHOLD}}" task coverage:check

        echo ""
        echo "=========================================="
        echo "✅ CI Pipeline Completed Successfully!"
        echo "=========================================="
